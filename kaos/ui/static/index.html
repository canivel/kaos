<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAOS — Agent Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --fg:#e4e4ef;--fg2:#9494a8;--fg3:#5a5a72;
  --accent:#6c5ce7;--accent2:#a29bfe;--cyan:#18ffff;
  --green:#00e676;--orange:#ff9100;--red:#ff5252;--yellow:#ffd600;
  --gray:#636e72;
  --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --radius:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px}
a{color:var(--accent2);text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:13px}
input{font-family:inherit;font-size:13px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh}

/* Top bar */
#topbar{
  display:flex;align-items:center;gap:12px;
  height:52px;min-height:52px;
  padding:0 16px;
  background:var(--bg2);
  border-bottom:1px solid rgba(108,92,231,.2);
  z-index:10;
  flex-shrink:0;
}
#topbar .logo{
  font-family:var(--mono);font-weight:700;font-size:1.1rem;
  letter-spacing:3px;color:var(--fg);margin-right:8px;
}
#topbar .logo span{color:var(--accent2)}
.stat-pill{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:var(--bg3);font-size:12px;font-family:var(--mono);
}
.stat-pill .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-pill .val{font-weight:700;color:var(--fg)}
.stat-pill .lbl{color:var(--fg3);font-size:11px}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#project-selector{
  background:var(--bg3);border:1px solid var(--bg4);
  color:var(--fg);padding:5px 10px;border-radius:6px;
  font-size:12px;font-family:var(--mono);cursor:pointer;
  max-width:240px;
}
#project-selector:focus{border-color:var(--accent);outline:none}
#btn-add-project{
  background:var(--bg3);border:1px solid var(--bg4);color:var(--fg2);
  padding:5px 10px;border-radius:6px;font-size:12px;
  transition:all .15s;
}
#btn-add-project:hover{border-color:var(--accent);color:var(--fg)}
#btn-refresh{
  background:var(--accent);color:#fff;
  padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;
  transition:opacity .15s;
}
#btn-refresh:hover{opacity:.85}
#sse-indicator{
  width:8px;height:8px;border-radius:50%;background:var(--gray);
  transition:background .3s;flex-shrink:0;
}
#sse-indicator.connected{background:var(--green)}
#sse-indicator.error{background:var(--red)}

/* ── Main split ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── Runs pane ── */
#runs-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#runs-toolbar{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:var(--bg2);border-bottom:1px solid var(--bg4);flex-shrink:0;
}
#runs-search{
  flex:1;max-width:260px;background:var(--bg3);border:1px solid var(--bg4);
  border-radius:6px;color:var(--fg);padding:5px 10px;font-size:12px;
}
#runs-search:focus{border-color:var(--accent);outline:none}
#runs-search::placeholder{color:var(--fg3)}
.rf-pill{
  padding:3px 10px;border-radius:14px;font-size:11px;font-family:var(--mono);
  background:var(--bg3);border:1px solid var(--bg4);color:var(--fg3);cursor:pointer;transition:all .12s;
}
.rf-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.rf-pill:hover:not(.active){color:var(--fg)}
#runs-body{flex:1;overflow-y:auto;padding:12px}

/* Execution cards */
.exec-card{
  background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;
  margin-bottom:10px;overflow:hidden;
  transition:border-color .15s;
}
.exec-card:hover{border-color:rgba(108,92,231,.4)}
.exec-header{
  display:flex;align-items:flex-start;gap:12px;padding:14px 16px;
  cursor:pointer;user-select:none;
}
.exec-chevron{color:var(--fg3);font-size:10px;margin-top:3px;flex-shrink:0;transition:transform .15s}
.exec-chevron.open{transform:rotate(90deg)}
.exec-main{flex:1;min-width:0}
.exec-goal{font-size:13px;color:var(--fg);line-height:1.5;margin-bottom:6px}
.exec-goal em{font-style:normal;color:var(--fg3);font-size:11px}
.exec-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.exec-time{font-size:11px;font-family:var(--mono);color:var(--fg3)}
.exec-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;width:120px;flex-shrink:0;gap:1px}
.exec-bar-seg{height:100%}
.exec-pills{display:flex;gap:5px;flex-wrap:wrap}
.ep{font-size:11px;font-family:var(--mono);padding:1px 7px;border-radius:10px}

/* Agent rows inside card */
.exec-agents{background:var(--bg);border-top:1px solid var(--bg4);padding:4px 0}
.exec-agent-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 16px 7px 42px;cursor:pointer;
  transition:background .1s;
}
.exec-agent-row:hover{background:var(--bg2)}
.exec-agent-row.selected{background:rgba(108,92,231,.12);border-left:3px solid var(--accent);padding-left:39px}
.ea-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ea-role{font-size:11px;font-family:var(--mono);color:var(--accent2);flex-shrink:0;width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ea-task{font-size:12px;color:var(--fg2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ea-status{font-size:10px;font-family:var(--mono);flex-shrink:0;padding:1px 6px;border-radius:8px}
.runs-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--fg3);gap:8px;font-size:13px}

/* ── Timeline / Gantt ── */
.tl-axis{display:grid;grid-template-columns:130px 1fr;gap:8px;padding:6px 16px 3px 42px}
.tl-axis-ticks{display:flex;justify-content:space-between}
.tl-axis-tick{font-size:9px;font-family:var(--mono);color:var(--fg3)}
.tl-row{display:grid;grid-template-columns:130px 1fr;align-items:center;height:26px;gap:8px;cursor:pointer;padding:2px 16px 2px 42px;border-radius:3px;transition:background .1s}
.tl-row:hover{background:rgba(255,255,255,.04)}
.tl-row.selected{background:rgba(108,92,231,.1);border-left:3px solid var(--accent);padding-left:39px}
.tl-name{font-size:11px;font-family:var(--mono);color:var(--accent2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-track{position:relative;height:14px;background:rgba(255,255,255,.04);border-radius:3px}
.tl-bar{position:absolute;top:0;height:100%;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;min-width:3px;overflow:hidden}
.tl-dur{font-size:9px;font-family:var(--mono);white-space:nowrap;position:relative;z-index:1}
.tl-bar-run{position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);background-size:200% 100%;animation:tl-shimmer 1.6s linear infinite}
@keyframes tl-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.tl-now-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.15);pointer-events:none}

/* ── Detail panel ── */
#detail-pane{
  width:0;min-width:0;
  background:var(--bg2);
  border-left:1px solid var(--bg4);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .25s ease;
}
#detail-pane.open{width:420px;min-width:420px}

#detail-header{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--bg4);
  display:flex;align-items:flex-start;gap:10px;
  flex-shrink:0;
}
#detail-close{
  margin-left:auto;background:none;color:var(--fg3);
  font-size:18px;padding:0 4px;
  transition:color .15s;
}
#detail-close:hover{color:var(--fg)}
#detail-agent-name{font-size:15px;font-weight:700;font-family:var(--mono);word-break:break-all}
#detail-agent-id{font-size:11px;color:var(--fg3);font-family:var(--mono);margin-top:2px;word-break:break-all}
#detail-status-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;
  margin-top:5px;
}

/* Tabs */
#detail-tabs{
  display:flex;border-bottom:1px solid var(--bg4);
  flex-shrink:0;overflow-x:auto;
}
.tab-btn{
  padding:9px 14px;font-size:12px;font-weight:600;color:var(--fg3);
  background:none;border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap;
}
.tab-btn:hover{color:var(--fg2)}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent2)}

#detail-body{flex:1;overflow-y:auto;padding:12px}

/* Meta cards */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.meta-card{background:var(--bg3);border-radius:6px;padding:8px 10px}
.meta-card .lbl{font-size:10px;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.meta-card .val{font-size:13px;font-family:var(--mono);word-break:break-all}

/* Events list */
.event-item{
  display:flex;gap:8px;padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  font-size:12px;
}
.event-item:last-child{border-bottom:none}
.event-ts{color:var(--fg3);font-family:var(--mono);font-size:11px;flex-shrink:0;padding-top:1px}
.event-type{
  font-family:var(--mono);font-size:11px;font-weight:600;
  padding:1px 6px;border-radius:3px;flex-shrink:0;white-space:nowrap;
}
.event-payload{color:var(--fg2);word-break:break-word;flex:1}

/* Tool call tree */
.call-node{margin-bottom:6px}
.call-header{
  display:flex;align-items:center;gap:7px;
  padding:7px 10px;border-radius:6px;
  background:var(--bg3);cursor:pointer;
  transition:background .15s;
}
.call-header:hover{background:var(--bg4)}
.call-name{font-family:var(--mono);font-size:12px;font-weight:600;flex:1}
.call-duration{font-size:11px;color:var(--fg3);font-family:var(--mono)}
.call-tokens{font-size:11px;color:var(--fg2);font-family:var(--mono)}
.call-status{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.call-children{margin-left:18px;margin-top:4px;border-left:1px solid var(--bg4);padding-left:10px}
.call-detail{
  padding:6px 10px;font-size:11px;color:var(--fg2);font-family:var(--mono);
  background:var(--bg);border-radius:0 0 6px 6px;
  word-break:break-word;display:none;
  max-height:200px;overflow-y:auto;
}
.call-detail.open{display:block}

/* Checkpoints */
.cp-timeline{position:relative;padding-left:20px;margin-top:6px}
.cp-timeline::before{
  content:'';position:absolute;left:7px;top:0;bottom:0;
  width:2px;background:var(--bg4);
}
.cp-item{
  position:relative;margin-bottom:12px;
  padding:8px 10px;border-radius:6px;background:var(--bg3);
}
.cp-item::before{
  content:'';position:absolute;left:-17px;top:12px;
  width:10px;height:10px;border-radius:50%;
  background:var(--accent2);border:2px solid var(--bg2);
}
.cp-label{font-size:12px;font-weight:600;font-family:var(--mono)}
.cp-ts{font-size:11px;color:var(--fg3);margin-top:2px}

/* Files */
.file-breadcrumb{
  display:flex;align-items:center;flex-wrap:wrap;gap:4px;
  margin-bottom:8px;font-size:12px;font-family:var(--mono);color:var(--fg3);
}
.file-breadcrumb span{cursor:pointer;color:var(--accent2)}
.file-breadcrumb span:hover{text-decoration:underline}
.file-entry{
  display:flex;align-items:center;gap:8px;
  padding:5px 8px;border-radius:5px;cursor:pointer;
  transition:background .12s;font-size:12px;
}
.file-entry:hover{background:var(--bg3)}
.file-icon{font-size:13px;flex-shrink:0}
.file-name{font-family:var(--mono);flex:1;word-break:break-all}
.file-size{color:var(--fg3);font-size:11px;white-space:nowrap}

/* ── Event feed (bottom strip) ── */
#feed-pane{
  height:140px;min-height:140px;flex-shrink:0;
  background:var(--bg2);border-top:1px solid var(--bg4);
  display:flex;flex-direction:column;overflow:hidden;
}
#feed-header{
  display:flex;align-items:center;gap:8px;padding:6px 12px;
  border-bottom:1px solid var(--bg4);flex-shrink:0;
}
#feed-header h3{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--fg3)}
.filter-pill{
  padding:2px 8px;border-radius:12px;font-size:11px;
  background:var(--bg3);color:var(--fg3);border:1px solid var(--bg4);
  cursor:pointer;transition:all .15s;
}
.filter-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#feed-body{flex:1;overflow-y:auto;padding:4px 0}
.feed-row{
  display:flex;align-items:baseline;gap:8px;padding:3px 12px;
  font-size:11px;font-family:var(--mono);
  border-bottom:1px solid rgba(255,255,255,.03);
  transition:background .1s;
}
.feed-row:hover{background:var(--bg3)}
.feed-ts{color:var(--fg3);flex-shrink:0;width:80px}
.feed-agent{color:var(--accent2);flex-shrink:0;width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-type{flex-shrink:0;width:140px;overflow:hidden;text-overflow:ellipsis}
.feed-payload{color:var(--fg2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Tooltip ── */
#tooltip{
  position:fixed;z-index:100;
  background:var(--bg2);border:1px solid var(--bg4);
  border-radius:6px;padding:8px 12px;font-size:12px;
  pointer-events:none;opacity:0;transition:opacity .15s;
  max-width:240px;line-height:1.5;
}

/* ── Modal (add project) ── */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:200;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#modal-overlay.open{opacity:1;pointer-events:all}
#modal{
  background:var(--bg2);border:1px solid var(--bg4);
  border-radius:12px;padding:24px;width:420px;
  display:flex;flex-direction:column;gap:14px;
}
#modal h2{font-size:15px;font-weight:700}
#modal input{
  width:100%;background:var(--bg3);border:1px solid var(--bg4);
  color:var(--fg);padding:8px 12px;border-radius:6px;
  transition:border-color .15s;
}
#modal input:focus{border-color:var(--accent);outline:none}
#modal input::placeholder{color:var(--fg3)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
.btn-cancel{background:var(--bg3);color:var(--fg2);padding:7px 16px;border-radius:6px;transition:background .15s}
.btn-cancel:hover{background:var(--bg4)}
.btn-confirm{background:var(--accent);color:#fff;padding:7px 16px;border-radius:6px;font-weight:600;transition:opacity .15s}
.btn-confirm:hover{opacity:.85}

/* ── Loading / error states ── */
.loading{color:var(--fg3);font-size:12px;padding:16px;text-align:center}
.error-msg{color:var(--red);font-size:12px;padding:8px 12px;background:rgba(255,82,82,.08);border-radius:5px;margin:8px 0}

/* ── Scrollable section label ── */
.section-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--fg3);margin:12px 0 6px}
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">KA<span>OS</span></div>
    <div class="stat-pill">
      <div class="dot" style="background:var(--accent)"></div>
      <span class="val" id="stat-running">0</span>
      <span class="lbl">running</span>
    </div>
    <div class="stat-pill">
      <div class="dot" style="background:var(--green)"></div>
      <span class="val" id="stat-completed">0</span>
      <span class="lbl">completed</span>
    </div>
    <div class="stat-pill">
      <div class="dot" style="background:var(--red)"></div>
      <span class="val" id="stat-failed">0</span>
      <span class="lbl">failed</span>
    </div>
    <div class="stat-pill">
      <div class="dot" style="background:var(--fg3)"></div>
      <span class="val" id="stat-total">0</span>
      <span class="lbl">total agents</span>
    </div>
    <div class="stat-pill" style="margin-left:8px">
      <span class="val" id="stat-events">0</span>
      <span class="lbl">events</span>
    </div>
    <div class="stat-pill">
      <span class="val" id="stat-calls">0</span>
      <span class="lbl">tool calls</span>
    </div>
    <div class="stat-pill">
      <span class="val" id="stat-tokens">0</span>
      <span class="lbl">tokens</span>
    </div>
    <div id="topbar-right">
      <div id="sse-indicator" title="Live stream"></div>
      <select id="project-selector"></select>
      <button id="btn-add-project" onclick="openAddProject()">+ Project</button>
      <button id="btn-refresh" onclick="fullRefresh()">↻ Refresh</button>
    </div>
  </div>

  <!-- Main area -->
  <div id="main">

    <!-- Runs / executions -->
    <div id="runs-pane">
      <div id="runs-toolbar">
        <input id="runs-search" type="text" placeholder="Search goal, task, agent name…" oninput="onRunsSearch(this.value)">
        <span class="rf-pill active" onclick="setRFilter(this,'all')">all</span>
        <span class="rf-pill" onclick="setRFilter(this,'running')" style="color:var(--accent)">running</span>
        <span class="rf-pill" onclick="setRFilter(this,'completed')" style="color:var(--green)">done</span>
        <span class="rf-pill" onclick="setRFilter(this,'failed')" style="color:var(--red)">failed</span>
        <span class="rf-pill" onclick="setRFilter(this,'killed')" style="color:var(--gray)">killed</span>
      </div>
      <div id="runs-body"><div class="runs-empty"><p>Loading…</p></div></div>
    </div>

    <!-- Detail panel -->
    <div id="detail-pane">
      <div id="detail-header">
        <div>
          <div id="detail-agent-name">—</div>
          <div id="detail-agent-id"></div>
          <div id="detail-status-badge"></div>
        </div>
        <button id="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div id="detail-tabs">
        <button class="tab-btn active" data-tab="overview" onclick="switchTab(this)">Overview</button>
        <button class="tab-btn" data-tab="events" onclick="switchTab(this)">Events</button>
        <button class="tab-btn" data-tab="calls" onclick="switchTab(this)">Tool Calls</button>
        <button class="tab-btn" data-tab="files" onclick="switchTab(this)">Files</button>
        <button class="tab-btn" data-tab="checkpoints" onclick="switchTab(this)">Checkpoints</button>
      </div>
      <div id="detail-body"><p class="loading">Select an agent node to inspect it.</p></div>
    </div>
  </div>

  <!-- Event feed -->
  <div id="feed-pane">
    <div id="feed-header">
      <h3>Live Events</h3>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <span class="filter-pill active" data-type="all" onclick="setFeedFilter(this)">all</span>
        <span class="filter-pill" data-type="agent_spawn" onclick="setFeedFilter(this)">spawn</span>
        <span class="filter-pill" data-type="file_write" onclick="setFeedFilter(this)">write</span>
        <span class="filter-pill" data-type="tool_call_start" onclick="setFeedFilter(this)">tool_call</span>
        <span class="filter-pill" data-type="checkpoint_create" onclick="setFeedFilter(this)">checkpoint</span>
        <span class="filter-pill" data-type="checkpoint_restore" onclick="setFeedFilter(this)">restore</span>
        <span class="filter-pill" data-type="agent_complete" onclick="setFeedFilter(this)">complete</span>
        <span class="filter-pill" data-type="agent_fail" onclick="setFeedFilter(this)">fail</span>
      </div>
    </div>
    <div id="feed-body"></div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Add project modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Open Project</h2>
    <div>
      <div style="font-size:12px;color:var(--fg3);margin-bottom:6px">Path to kaos.db file</div>
      <input id="modal-path" type="text" placeholder="/path/to/project/kaos.db" />
    </div>
    <div>
      <div style="font-size:12px;color:var(--fg3);margin-bottom:6px">Project name (optional)</div>
      <input id="modal-name" type="text" placeholder="my-project" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddProject()">Cancel</button>
      <button class="btn-confirm" onclick="confirmAddProject()">Open</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const S = {
  db: new URLSearchParams(location.search).get('db') || './kaos.db',
  agents: [],
  selectedAgent: null,
  activeTab: 'overview',
  feedFilter: 'all',
  feedRows: [],
  sseSource: null,
  filePath: '/',
  rFilter: 'all',
  rSearch: '',
};

// ── Colors ────────────────────────────────────────────────────────────────
const STATUS_COLOR = {
  running: '#6c5ce7',
  completed: '#00e676',
  failed: '#ff5252',
  paused: '#ff9100',
  killed: '#636e72',
  initialized: '#a29bfe',
};
const STATUS_BG = {
  running: 'rgba(108,92,231,.15)',
  completed: 'rgba(0,230,118,.12)',
  failed: 'rgba(255,82,82,.12)',
  paused: 'rgba(255,145,0,.12)',
  killed: 'rgba(99,110,114,.12)',
  initialized: 'rgba(162,155,254,.12)',
};
const EVENT_COLOR = {
  file_write: '#a29bfe',
  file_read: '#74b9ff',
  file_delete: '#ff5252',
  tool_call_start: '#00e676',
  tool_call_end: '#55efc4',
  agent_spawn: '#6c5ce7',
  agent_complete: '#00e676',
  agent_fail: '#ff5252',
  agent_kill: '#ff5252',
  agent_pause: '#ff9100',
  agent_resume: '#ff9100',
  checkpoint_create: '#ffd600',
  checkpoint_restore: '#fdcb6e',
  state_change: '#fd79a8',
  error: '#ff5252',
  warning: '#ff9100',
};

// ── Helpers ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const api = async (path) => {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(`${path}${sep}db=${encodeURIComponent(S.db)}`);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
};
const fmt = {
  ts: s => s ? s.replace('T', ' ').replace('Z', '').slice(0, 19) : '—',
  id: s => s ? s.slice(0, 8) : '—',
  num: n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : String(n||0),
  bytes: b => b >= 1048576 ? (b/1048576).toFixed(1)+'MB' : b >= 1024 ? (b/1024).toFixed(1)+'KB' : (b||0)+'B',
  dur: ms => ms == null ? '—' : ms >= 1000 ? (ms/1000).toFixed(2)+'s' : ms+'ms',
  payload: p => {
    if (!p) return '';
    if (typeof p === 'string') return p.slice(0, 120);
    const s = JSON.stringify(p);
    return s.length > 120 ? s.slice(0,120)+'…' : s;
  },
};

// ── Project management ────────────────────────────────────────────────────
async function loadProjects() {
  try {
    const projects = await (await fetch('/api/projects')).json();
    const sel = $('project-selector');
    sel.innerHTML = '';
    if (!projects.length) {
      sel.innerHTML = '<option value="">No projects</option>';
      return;
    }
    projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.path;
      opt.textContent = p.name || p.path;
      if (p.path === S.db) opt.selected = true;
      sel.appendChild(opt);
    });
    // If current db not in list, add it
    if (!projects.find(p => p.path === S.db)) {
      const opt = document.createElement('option');
      opt.value = S.db;
      opt.textContent = S.db;
      opt.selected = true;
      sel.insertBefore(opt, sel.firstChild);
    }
  } catch(e) { console.error('loadProjects', e); }
}

$('project-selector').addEventListener('change', e => {
  const path = e.target.value;
  if (path) switchProject(path);
});

function switchProject(path) {
  S.db = path;
  history.replaceState({}, '', `?db=${encodeURIComponent(path)}`);
  closeDetail();
  fullRefresh();
  reconnectSSE();
}

function openAddProject() { $('modal-overlay').classList.add('open'); $('modal-path').focus(); }
function closeAddProject() { $('modal-overlay').classList.remove('open'); }
async function confirmAddProject() {
  const path = $('modal-path').value.trim();
  const name = $('modal-name').value.trim();
  if (!path) return;
  await fetch('/api/projects', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({path, name}),
  });
  closeAddProject();
  await loadProjects();
  switchProject(path);
}
$('modal-path').addEventListener('keydown', e => { if(e.key==='Enter') confirmAddProject(); });
$('modal-overlay').addEventListener('click', e => { if(e.target===$('modal-overlay')) closeAddProject(); });

// ── Stats ─────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const d = await api('/api/stats');
    $('stat-running').textContent = d.agents?.running || 0;
    $('stat-completed').textContent = d.agents?.completed || 0;
    $('stat-failed').textContent = d.agents?.failed || 0;
    $('stat-total').textContent = d.agents?.total_agents || 0;
    $('stat-events').textContent = fmt.num(d.events || 0);
    $('stat-calls').textContent = fmt.num(d.tool_calls || 0);
    $('stat-tokens').textContent = fmt.num(d.tokens || 0);
  } catch(e) { console.error('loadStats', e); }
}

// ── Agent helpers ─────────────────────────────────────────────────────────
function agentRole(a) {
  if (a.config && a.config.role) return a.config.role;
  return a.name
    .replace(/-[0-9A-Z]{8,}$/i, '')
    .replace(/[-_]\d+[-_]?$/, '')
    .replace(/[-_]+$/, '')
    || 'agent';
}
function shortTask(desc, maxLen = 80) {
  if (!desc) return '';
  let s = desc;
  try { s = JSON.parse(desc); } catch(e) {}
  s = String(s).replace(/\s+/g, ' ').trim();
  return s.length > maxLen ? s.slice(0, maxLen) + '…' : s;
}

// ── Execution-card rendering ───────────────────────────────────────────────
function onRunsSearch(v) {
  S.rSearch = v.toLowerCase();
  renderRuns(S.agents);
}

function setRFilter(el, f) {
  S.rFilter = f;
  document.querySelectorAll('.rf-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderRuns(S.agents);
}

// Pick the most informative task description from a group of agents
function groupGoal(agents) {
  // Prefer the one with the longest task_description (most informative)
  let best = '';
  for (const a of agents) {
    const t = shortTask(a.task_description, 200);
    if (t.length > best.length) best = t;
  }
  return best;
}

// ── Time helpers ──────────────────────────────────────────────────────────
function parseTs(s) {
  if (!s) return 0;
  return new Date(s.includes('T') ? s : s.replace(' ', 'T')).getTime();
}
function fmtDur(ms) {
  if (ms <= 0) return '';
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000);
  return m + 'm' + (s ? ' ' + s + 's' : '');
}

function renderRuns(allAgents) {
  const body = $('runs-body');
  if (!allAgents.length) {
    body.innerHTML = '<div class="runs-empty"><p>No agents found.</p></div>';
    return;
  }

  let agents = allAgents;
  if (S.rFilter !== 'all') agents = allAgents.filter(a => a.status === S.rFilter);
  const q = S.rSearch;
  if (q) agents = agents.filter(a =>
    a.name.toLowerCase().includes(q) ||
    (a.task_description||'').toLowerCase().includes(q) ||
    agentRole(a).toLowerCase().includes(q)
  );
  if (!agents.length) {
    body.innerHTML = '<div class="runs-empty"><p>No agents match this filter.</p></div>';
    return;
  }

  // Group by batch_minute
  const waveMap = new Map();
  agents.forEach(a => {
    const key = a.batch_minute || a.created_at?.slice(0, 16) || 'unknown';
    if (!waveMap.has(key)) waveMap.set(key, []);
    waveMap.get(key).push(a);
  });
  const waves = [...waveMap.entries()].sort((a, b) => b[0].localeCompare(a[0]));

  const now = Date.now();

  const fragments = waves.map(([minute, wAgents]) => {
    const goal = groupGoal(wAgents);
    const counts = {};
    wAgents.forEach(a => { counts[a.status] = (counts[a.status]||0) + 1; });
    const total = wAgents.length;

    // ── Compute timing for Gantt ──────────────────────────────────────────
    const withTimes = wAgents.map(a => {
      const startMs = parseTs(a.created_at);
      const rawEnd = a.status === 'running'
        ? now
        : parseTs(a.last_heartbeat || a.created_at);
      const endMs = Math.max(rawEnd, startMs + 500);
      return { ...a, startMs, endMs };
    }).sort((a, b) => a.startMs - b.startMs);

    const waveStart = Math.min(...withTimes.map(a => a.startMs));
    const rawWaveEnd = Math.max(...withTimes.map(a => a.endMs));
    // Pad 8% right margin so the last bar isn't flush
    const waveDur = Math.max((rawWaveEnd - waveStart) * 1.08, 5000);

    // Time axis ticks
    const TICK_N = 5;
    const ticks = Array.from({ length: TICK_N + 1 }, (_, i) =>
      fmtDur(Math.round(waveDur * i / TICK_N)) || '0s'
    );

    // ── Card status ────────────────────────────────────────────────────────
    const hasRunning = (counts.running||0) > 0;
    const hasFailed  = (counts.failed||0) > 0;
    const allDone    = (counts.completed||0) === total;
    const accent = hasRunning ? '#6c5ce7' : hasFailed ? '#ff5252' : allDone ? '#00e676' : '#636e72';

    const barSegs = [
      ['completed','#00e676'],['running','#6c5ce7'],['failed','#ff5252'],
      ['killed','#636e72'],['paused','#ff9100'],
    ].filter(([st]) => counts[st])
     .map(([st,c]) => `<div class="exec-bar-seg" style="width:${(counts[st]/total*100).toFixed(1)}%;background:${c}"></div>`)
     .join('');

    const pills = [
      ['running','#6c5ce7','rgba(108,92,231,.15)'],
      ['completed','#00e676','rgba(0,230,118,.12)'],
      ['failed','#ff5252','rgba(255,82,82,.12)'],
      ['killed','#636e72','rgba(99,110,114,.12)'],
    ].filter(([st]) => counts[st])
     .map(([st,c,bg]) => `<span class="ep" style="color:${c};background:${bg};border:1px solid ${c}33">${counts[st]} ${st}</span>`)
     .join('');

    const timeStr = minute.replace('T', ' ');
    const isOpen = hasRunning || wAgents.length <= 12; // auto-expand small/running waves
    const cardId = 'card-' + minute.replace(/[^a-z0-9]/gi, '_');

    // ── Now-line position (only for running waves) ─────────────────────────
    const nowLinePct = hasRunning
      ? Math.min(100, ((now - waveStart) / waveDur * 100)).toFixed(2)
      : null;

    // ── Axis ──────────────────────────────────────────────────────────────
    const axisHtml = `
      <div class="tl-axis">
        <div></div>
        <div class="tl-axis-ticks">${ticks.map(t => `<span class="tl-axis-tick">${escHtml(t)}</span>`).join('')}</div>
      </div>`;

    // ── Agent rows (Gantt bars) ────────────────────────────────────────────
    const agentRows = withTimes.map(a => {
      const leftPct  = ((a.startMs - waveStart) / waveDur * 100).toFixed(2);
      const widthPct = Math.max(1.2, (a.endMs - a.startMs) / waveDur * 100).toFixed(2);
      const dur      = fmtDur(a.endMs - a.startMs);
      const c        = STATUS_COLOR[a.status] || '#636e72';
      const role     = agentRole(a);
      const isSelected = a.agent_id === S.selectedAgent;
      const runShimmer = a.status === 'running'
        ? `<div class="tl-bar-run"></div>` : '';
      return `
        <div class="tl-row${isSelected ? ' selected' : ''}" id="arow-${a.agent_id}"
             onclick="openDetail('${escHtml(a.agent_id)}')"
             title="${escHtml(role + ' — ' + (shortTask(a.task_description,100)||a.name))}">
          <div class="tl-name">${escHtml(role)}</div>
          <div class="tl-track">
            ${nowLinePct !== null ? `<div class="tl-now-line" style="left:${nowLinePct}%"></div>` : ''}
            <div class="tl-bar" style="left:${leftPct}%;width:${widthPct}%;background:${c}20;border:1px solid ${c}55;border-left:3px solid ${c}">
              ${runShimmer}
              ${dur ? `<span class="tl-dur" style="color:${c}">${dur}</span>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="exec-card" id="${cardId}" style="border-color:${hasRunning ? accent+'55' : ''}">
        <div class="exec-header" onclick="toggleCard('${cardId}')">
          <div class="exec-chevron${isOpen ? ' open' : ''}">▶</div>
          <div class="exec-main">
            <div class="exec-goal">${goal ? escHtml(goal) : '<em>'+total+' agents — no task description</em>'}</div>
            <div class="exec-meta">
              <span class="exec-time">${escHtml(timeStr)}</span>
              <span class="exec-time" style="color:var(--fg3)">${total} agent${total>1?'s':''} · ${fmtDur(rawWaveEnd-waveStart)||'<1s'}</span>
              <div class="exec-bar">${barSegs}</div>
              <div class="exec-pills">${pills}</div>
            </div>
          </div>
        </div>
        <div class="exec-agents" id="${cardId}-agents" style="display:${isOpen?'block':'none'}">
          ${axisHtml}
          ${agentRows}
        </div>
      </div>`;
  });

  body.innerHTML = fragments.join('');
}

function toggleCard(cardId) {
  const agents = document.getElementById(cardId + '-agents');
  const chevron = document.querySelector('#' + cardId + ' .exec-chevron');
  if (!agents) return;
  const open = agents.style.display !== 'none';
  agents.style.display = open ? 'none' : 'block';
  if (chevron) chevron.classList.toggle('open', !open);
}

// ── Live status update ────────────────────────────────────────────────────
function updateNodeStatus(agentId, status) {
  const a = S.agents.find(x => x.agent_id === agentId);
  if (a) a.status = status;
  // Update bar color in the Gantt row if visible
  const row = document.getElementById('arow-' + agentId);
  if (row) {
    const bar = row.querySelector('.tl-bar');
    const color = STATUS_COLOR[status] || '#636e72';
    if (bar) {
      bar.style.background = color + '20';
      bar.style.border = `1px solid ${color}55`;
      bar.style.borderLeft = `3px solid ${color}`;
      const dur = bar.querySelector('.tl-dur');
      if (dur) dur.style.color = color;
      // Add/remove shimmer for running
      let shimmer = bar.querySelector('.tl-bar-run');
      if (status === 'running' && !shimmer) {
        shimmer = document.createElement('div');
        shimmer.className = 'tl-bar-run';
        bar.insertBefore(shimmer, bar.firstChild);
      } else if (status !== 'running' && shimmer) {
        shimmer.remove();
      }
    }
  }
}

// ── Load agents ───────────────────────────────────────────────────────────
async function loadAgents(forceRedraw = false) {
  try {
    const fresh = await api('/api/agents');
    S.agents = fresh;
    renderRuns(S.agents);
  } catch(e) { console.error('loadAgents', e); }
}

// ── Detail panel ──────────────────────────────────────────────────────────
async function openDetail(agentId) {
  // Deselect previous row
  if (S.selectedAgent) {
    const prev = document.getElementById('arow-' + S.selectedAgent);
    if (prev) prev.classList.remove('selected');
  }
  S.selectedAgent = agentId;
  $('detail-pane').classList.add('open');

  // Highlight selected row
  const row = document.getElementById('arow-' + agentId);
  if (row) { row.classList.add('selected'); row.scrollIntoView({ block: 'nearest' }); }

  try {
    const agent = await api(`/api/agents/${agentId}`);
    $('detail-agent-name').textContent = agent.name;
    $('detail-agent-id').textContent = agent.agent_id;
    const badge = $('detail-status-badge');
    badge.textContent = agent.status;
    badge.style.background = STATUS_BG[agent.status]||'rgba(99,110,114,.12)';
    badge.style.color = STATUS_COLOR[agent.status]||'#636e72';
    badge.style.border = `1px solid ${STATUS_COLOR[agent.status]||'#636e72'}33`;
    await renderTab(S.activeTab, agent);
  } catch(e) {
    $('detail-body').innerHTML = `<p class="error-msg">${e.message}</p>`;
  }
}

function closeDetail() {
  if (S.selectedAgent) {
    const prev = document.getElementById('arow-' + S.selectedAgent);
    if (prev) prev.classList.remove('selected');
  }
  S.selectedAgent = null;
  $('detail-pane').classList.remove('open');
}

async function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.activeTab = btn.dataset.tab;
  if (S.selectedAgent) {
    try {
      const agent = await api(`/api/agents/${S.selectedAgent}`);
      await renderTab(S.activeTab, agent);
    } catch(e) {
      $('detail-body').innerHTML = `<p class="error-msg">${e.message}</p>`;
    }
  }
}

async function renderTab(tab, agent) {
  const body = $('detail-body');
  body.innerHTML = '<p class="loading">Loading…</p>';
  try {
    switch(tab) {
      case 'overview':  body.innerHTML = renderOverview(agent); break;
      case 'events':    body.innerHTML = await renderEvents(agent.agent_id); break;
      case 'calls':     body.innerHTML = await renderCalls(agent.agent_id); break;
      case 'files':     S.filePath='/'; body.innerHTML = await renderFiles(agent.agent_id, '/'); break;
      case 'checkpoints': body.innerHTML = await renderCheckpoints(agent.agent_id); break;
    }
    // Re-bind call toggles
    document.querySelectorAll('.call-header').forEach(h => {
      h.addEventListener('click', () => {
        h.nextElementSibling.classList.toggle('open');
      });
    });
    // File navigation
    document.querySelectorAll('.file-entry[data-is-dir="1"]').forEach(el => {
      el.addEventListener('click', async () => {
        S.filePath = el.dataset.path;
        body.innerHTML = await renderFiles(agent.agent_id, S.filePath);
        bindFileNav(agent.agent_id);
      });
    });
    document.querySelectorAll('.breadcrumb-part').forEach(el => {
      el.addEventListener('click', async () => {
        S.filePath = el.dataset.path;
        body.innerHTML = await renderFiles(agent.agent_id, S.filePath);
        bindFileNav(agent.agent_id);
      });
    });
  } catch(e) {
    body.innerHTML = `<p class="error-msg">${e.message}</p>`;
  }
}

function bindFileNav(agentId) {
  document.querySelectorAll('.file-entry[data-is-dir="1"]').forEach(el => {
    el.addEventListener('click', async () => {
      S.filePath = el.dataset.path;
      $('detail-body').innerHTML = await renderFiles(agentId, S.filePath);
      bindFileNav(agentId);
    });
  });
  document.querySelectorAll('.breadcrumb-part').forEach(el => {
    el.addEventListener('click', async () => {
      S.filePath = el.dataset.path;
      $('detail-body').innerHTML = await renderFiles(agentId, S.filePath);
      bindFileNav(agentId);
    });
  });
}

function renderOverview(a) {
  const cfg = a.config || {};
  const meta = a.metadata || {};
  const cfgStr = Object.keys(cfg).length ? JSON.stringify(cfg, null, 2) : '{}';
  const metaStr = Object.keys(meta).length ? JSON.stringify(meta, null, 2) : '{}';
  const task = shortTask(a.task_description, 400);
  const role = cfg.role || '';
  return `
    ${task ? `
    <div style="background:var(--bg3);border:1px solid rgba(108,92,231,.25);border-radius:8px;padding:12px 14px;margin-bottom:12px">
      ${role ? `<div style="font-size:10px;font-family:var(--mono);color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">${escHtml(role)}</div>` : ''}
      <div style="font-size:12px;color:var(--fg);line-height:1.6">${escHtml(task)}</div>
    </div>` : role ? `
    <div style="background:var(--bg3);border:1px solid rgba(108,92,231,.25);border-radius:8px;padding:10px 14px;margin-bottom:12px">
      <div style="font-size:10px;font-family:var(--mono);color:var(--accent2);text-transform:uppercase;letter-spacing:1px">${escHtml(role)}</div>
    </div>` : ''}
    <div class="meta-grid">
      <div class="meta-card"><div class="lbl">Status</div><div class="val" style="color:${STATUS_COLOR[a.status]||'#fff'}">${a.status}</div></div>
      <div class="meta-card"><div class="lbl">Files</div><div class="val">${a.file_count}</div></div>
      <div class="meta-card"><div class="lbl">Tool Calls</div><div class="val">${a.tool_call_count}</div></div>
      <div class="meta-card"><div class="lbl">Tokens</div><div class="val">${fmt.num(a.token_count)}</div></div>
      <div class="meta-card"><div class="lbl">Events</div><div class="val">${a.event_count}</div></div>
      <div class="meta-card"><div class="lbl">PID</div><div class="val">${a.pid||'—'}</div></div>
    </div>
    <div class="meta-card" style="margin-bottom:8px">
      <div class="lbl">Created</div>
      <div class="val">${fmt.ts(a.created_at)}</div>
    </div>
    ${a.last_heartbeat ? `<div class="meta-card" style="margin-bottom:8px"><div class="lbl">Last Heartbeat</div><div class="val">${fmt.ts(a.last_heartbeat)}</div></div>` : ''}
    ${a.parent_id ? `<div class="meta-card" style="margin-bottom:8px"><div class="lbl">Parent Agent</div><div class="val" style="cursor:pointer;color:var(--accent2)" onclick="openDetail('${a.parent_id}')">${a.parent_id.slice(0,16)}…</div></div>` : ''}
    <div class="section-lbl">Config</div>
    <pre style="font-size:11px;color:var(--fg2);background:var(--bg3);padding:10px;border-radius:6px;overflow-x:auto;line-height:1.5">${escHtml(cfgStr)}</pre>
    ${Object.keys(meta).length ? `<div class="section-lbl">Metadata</div><pre style="font-size:11px;color:var(--fg2);background:var(--bg3);padding:10px;border-radius:6px;overflow-x:auto;line-height:1.5">${escHtml(metaStr)}</pre>` : ''}
  `;
}

async function renderEvents(agentId) {
  const events = await api(`/api/agents/${agentId}/events?limit=200`);
  if (!events.length) return '<p class="loading" style="margin-top:20px">No events yet.</p>';
  return events.map(e => {
    const color = EVENT_COLOR[e.event_type]||'#9494a8';
    const payload = fmt.payload(e.payload);
    return `<div class="event-item">
      <span class="event-ts">${fmt.ts(e.timestamp).slice(11)}</span>
      <span class="event-type" style="background:${color}22;color:${color}">${e.event_type}</span>
      <span class="event-payload">${escHtml(payload)}</span>
    </div>`;
  }).join('');
}

async function renderCalls(agentId) {
  const roots = await api(`/api/agents/${agentId}/tool_calls`);
  if (!roots.length) return '<p class="loading" style="margin-top:20px">No tool calls yet.</p>';
  function renderNode(c, depth=0) {
    const color = c.status==='success' ? 'var(--green)' : c.status==='error' ? 'var(--red)' : c.status==='running' ? 'var(--accent)' : 'var(--fg3)';
    const inputStr = c.input ? JSON.stringify(c.input, null, 2) : '';
    const outputStr = c.output ? (typeof c.output==='string' ? c.output : JSON.stringify(c.output, null, 2)) : '';
    const hasChildren = c.children && c.children.length;
    return `<div class="call-node">
      <div class="call-header">
        <div class="call-status" style="background:${color}"></div>
        <div class="call-name">${escHtml(c.tool_name)}</div>
        ${c.duration_ms!=null?`<div class="call-duration">${fmt.dur(c.duration_ms)}</div>`:''}
        ${c.token_count?`<div class="call-tokens">${fmt.num(c.token_count)}t</div>`:''}
      </div>
      <div class="call-detail">
        ${inputStr?`<div style="color:var(--fg3);margin-bottom:4px">INPUT:</div><pre style="white-space:pre-wrap;word-break:break-word">${escHtml(inputStr.slice(0,600))}${inputStr.length>600?'…':''}</pre>`:''}
        ${outputStr?`<div style="color:var(--fg3);margin:6px 0 4px">OUTPUT:</div><pre style="white-space:pre-wrap;word-break:break-word">${escHtml(outputStr.slice(0,600))}${outputStr.length>600?'…':''}</pre>`:''}
        ${c.error_message?`<div style="color:var(--red);margin-top:6px">${escHtml(c.error_message)}</div>`:''}
      </div>
      ${hasChildren?`<div class="call-children">${c.children.map(ch=>renderNode(ch,depth+1)).join('')}</div>`:''}
    </div>`;
  }
  return roots.map(c => renderNode(c)).join('');
}

async function renderFiles(agentId, path) {
  const data = await api(`/api/agents/${agentId}/files?path=${encodeURIComponent(path)}`);
  const parts = path.split('/').filter(Boolean);
  const crumbs = ['<span class="breadcrumb-part" data-path="/">root</span>'];
  let cur = '';
  parts.forEach(p => { cur += '/'+p; crumbs.push(`<span style="color:var(--fg3)">/</span><span class="breadcrumb-part" data-path="${escHtml(cur)}">${escHtml(p)}</span>`); });

  const entries = data.entries || [];
  if (!entries.length) return `
    <div class="file-breadcrumb">${crumbs.join('')}</div>
    <p class="loading">No files.</p>`;

  return `<div class="file-breadcrumb">${crumbs.join('')}</div>` +
    entries.map(f => {
      const icon = f.is_dir ? '📁' : '📄';
      const name = f.path.split('/').pop() || f.path;
      return `<div class="file-entry" data-is-dir="${f.is_dir?1:0}" data-path="${escHtml(f.path)}">
        <span class="file-icon">${icon}</span>
        <span class="file-name">${escHtml(name)}</span>
        <span class="file-size">${f.is_dir?'':fmt.bytes(f.size||0)}</span>
      </div>`;
    }).join('');
}

async function renderCheckpoints(agentId) {
  const cps = await api(`/api/agents/${agentId}/checkpoints`);
  if (!cps.length) return '<p class="loading" style="margin-top:20px">No checkpoints.</p>';
  return `<div class="cp-timeline">` +
    cps.map(c => `
      <div class="cp-item">
        <div class="cp-label">${escHtml(c.label || c.checkpoint_id.slice(0,12)+'…')}</div>
        <div class="cp-ts">${fmt.ts(c.created_at)}</div>
        ${c.metadata?.notes ? `<div style="font-size:11px;color:var(--fg3);margin-top:3px">${escHtml(c.metadata.notes)}</div>` : ''}
      </div>`
    ).join('') + '</div>';
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Event feed ────────────────────────────────────────────────────────────
function setFeedFilter(el) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  S.feedFilter = el.dataset.type;
  renderFeed();
}

function addFeedRow(event) {
  S.feedRows.unshift(event);
  if (S.feedRows.length > 500) S.feedRows.pop();
  renderFeed();
}

function renderFeed() {
  const rows = S.feedFilter === 'all'
    ? S.feedRows
    : S.feedRows.filter(e => e.event_type && e.event_type.startsWith(S.feedFilter.replace(/_(start|end|create|restore)$/,'')));

  const html = rows.slice(0, 80).map(e => {
    const color = EVENT_COLOR[e.event_type]||'#9494a8';
    return `<div class="feed-row">
      <span class="feed-ts">${(e.timestamp||'').slice(11,19)||'—'}</span>
      <span class="feed-agent" title="${escHtml(e.agent_id||'')}" style="color:var(--accent2);cursor:pointer" onclick="openDetail('${escHtml(e.agent_id||'')}')">${(e.agent_id||'').slice(0,8)}</span>
      <span class="feed-type" style="color:${color}">${escHtml(e.event_type||'')}</span>
      <span class="feed-payload">${escHtml(fmt.payload(e.payload))}</span>
    </div>`;
  }).join('');
  $('feed-body').innerHTML = html || '<div style="padding:8px 12px;color:var(--fg3);font-size:11px">No events match filter.</div>';
}

// Pre-load recent events into feed
async function loadRecentEvents() {
  try {
    const allAgents = S.agents.slice(0, 20);
    const limit = Math.max(5, Math.floor(100 / Math.max(1, allAgents.length)));
    const promises = allAgents.map(a =>
      api(`/api/agents/${a.agent_id}/events?limit=${limit}`).catch(() => [])
    );
    const results = await Promise.all(promises);
    const all = results.flat().sort((a,b) => b.event_id - a.event_id).slice(0, 100);
    S.feedRows = all;
    renderFeed();
  } catch(e) { console.error('loadRecentEvents', e); }
}

// ── SSE ───────────────────────────────────────────────────────────────────
function reconnectSSE() {
  if (S.sseSource) { S.sseSource.close(); S.sseSource = null; }

  const url = `/api/events/stream?db=${encodeURIComponent(S.db)}`;
  const es = new EventSource(url);
  S.sseSource = es;

  es.onopen = () => {
    $('sse-indicator').className = 'connected';
  };

  es.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'new_event') {
        addFeedRow(msg.event);
        // If detail panel is open on this agent's events tab, append
        if (S.selectedAgent === msg.event.agent_id && S.activeTab === 'events') {
          const color = EVENT_COLOR[msg.event.event_type]||'#9494a8';
          const el = document.createElement('div');
          el.className = 'event-item';
          el.innerHTML = `
            <span class="event-ts">${fmt.ts(msg.event.timestamp).slice(11)}</span>
            <span class="event-type" style="background:${color}22;color:${color}">${msg.event.event_type}</span>
            <span class="event-payload">${escHtml(fmt.payload(msg.event.payload))}</span>`;
          $('detail-body').appendChild(el);
          $('detail-body').scrollTop = $('detail-body').scrollHeight;
        }
      } else if (msg.type === 'agent_update') {
        const a = msg.agent;
        updateNodeStatus(a.agent_id, a.status);
        loadStats();
      }
    } catch(err) { /* ignore parse errors */ }
  };

  es.onerror = () => {
    $('sse-indicator').className = 'error';
    // Reconnect after 5s
    setTimeout(() => { if (document.visibilityState !== 'hidden') reconnectSSE(); }, 5000);
  };
}

// ── Full refresh ───────────────────────────────────────────────────────────
async function fullRefresh() {
  await Promise.all([loadStats(), loadAgents(true)]);
  await loadRecentEvents();
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  if (S.db && S.db !== './kaos.db') {
    fetch('/api/projects', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path: S.db}),
    }).catch(()=>{});
  }

  await loadProjects();
  await fullRefresh();
  reconnectSSE();

  // Periodic stats refresh
  setInterval(loadStats, 15000);
}

init();
</script>
