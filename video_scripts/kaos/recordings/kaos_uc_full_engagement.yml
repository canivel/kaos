config:
  command: bash
  cwd: null
  env:
    recording: true
  cols: 100
  rows: 30
  repeat: 0
  quality: 100
  frameDelay: auto
  maxIdleTime: 2000
  frameBox:
    type: window
    title: "KAOS \u2014 Full Engagement Walkthrough"
    style:
      border: 0px black solid
  cursorStyle: bar
  fontFamily: Consolas, Menlo, monospace
  fontSize: 14
  lineHeight: 1.35
  theme:
    background: '#0d1117'
    foreground: '#c9d1d9'
    black: '#161b22'
    red: '#ff7b72'
    green: '#3fb950'
    yellow: '#e3b341'
    blue: '#58a6ff'
    magenta: '#bc8cff'
    cyan: '#39c5cf'
    white: '#b5bac4'
    brightBlack: '#6e7681'
    brightRed: '#ffa198'
    brightGreen: '#56d364'
    brightYellow: '#e3b341'
    brightBlue: '#79c0ff'
    brightMagenta: '#d2a8ff'
    brightCyan: '#56d4dd'
    brightWhite: '#f0f6fc'

