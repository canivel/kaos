    content: "  \e[32m[result]\e[0m  \e[1mfeast-cold-start-fix\e[0m  \e[90m\u2014  fraud-agent\e[0m\n"
  - delay: 80
    content: "  Feast cold-start: inject global merchant risk percentile (p50)\n"
  - delay: 80
    content: "  as prior when feature vector is empty. Prevents NaN propagation.\n"
  - delay: 80
    content: "  AUC impact: none at p95. Resolved in 18s by SurrogateVerifier.\n\n"
  - delay: 600
    content: "\e[32m$\e[0m \e[1mKAOS_DB=payments-demo.db kaos memory search \"PCI DSS\"\e[0m\n\n"
  - delay: 650
