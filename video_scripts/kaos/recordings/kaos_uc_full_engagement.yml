  - delay: 800
    content: "\e[32m$\e[0m \e[1mkaos init --db payments-demo.db\e[0m\n"
  - delay: 350
    content: "\e[32mInitialized KAOS database:\e[0m payments-demo.db\n"
  - delay: 120
