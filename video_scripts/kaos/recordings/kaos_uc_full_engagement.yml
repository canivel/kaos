  # ── Scene 4: SurrogateVerifier ───────────────────────────────────────────
  - delay: 1200
    content: "\e[90m\u2500\u2500\u2500 Wave 2: SurrogateVerifier auto-diagnosed a failure \u2500\u2500\u2500\e[0m\n\n"
  - delay: 300
    content: "  \e[31m\u2715\e[0m  fraud-agent  iteration 2  \e[31mFAILED\e[0m\n\n"
  - delay: 600
    content: "  \e[33mSurrogateVerifier\e[0m analyzing outputs (reads results, not source)\n\n"
  - delay: 800
    content: "  \e[33mRoot cause:\e[0m  Feast cold-start returns empty vector for new\n"
  - delay: 80
    content: "               merchant_id. NaN propagates through GBM scorer\n"
  - delay: 80
    content: "               \u2192 pipeline crash on null input.\n\n"
  - delay: 500
    content: "  \e[96mFix proposed:\e[0m  Inject global merchant risk percentile (p50)\n"
  - delay: 80
    content: "                as prior when feature vector is empty.\n"
  - delay: 80
    content: "                Pattern matches skill: fraud-detection-gbm-pipeline\n\n"
  - delay: 700
    content: "  \e[32m\u2714\e[0m  Fix applied. Retrying iteration 3...\n"
  - delay: 400
    content: "  \e[32m\u2714\e[0m  fraud-agent  AUC 0.94 on synthetic holdout.  Done.\n\n"

