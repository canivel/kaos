  - delay: 1000
    content: "\e[90m\u2500\u2500\u2500 Wave 1: research-agent searches the skill library \u2500\u2500\u2500\e[0m\n\n"
  - delay: 400
    content: "\e[32m$\e[0m \e[1mKAOS_DB=payments-demo.db kaos skills search \"payments fastapi\"\e[0m\n\n"
  - delay: 600
    content: "  \e[96m\u25b6\e[0m  \e[1mfastapi-payment-gateway\e[0m\n"
  - delay: 80
    content: "     FastAPI gateway \u2014 idempotent handler, webhook delivery,\n"
  - delay: 80
    content: "     exponential retry, DLQ, OpenAPI auto-generation\n"
  - delay: 80
    content: "     \e[90mtags: [fastapi, payments, webhooks, idempotent]\e[0m\n\n"
  - delay: 700
    content: "\e[32m$\e[0m \e[1mKAOS_DB=payments-demo.db kaos skills search \"fraud detection\"\e[0m\n\n"
  - delay: 600
    content: "  \e[96m\u25b6\e[0m  \e[1mfraud-detection-gbm-pipeline\e[0m\n"
  - delay: 80
    content: "     GBM classifier \u2014 47 features, SHAP explainability, Feast\n"
  - delay: 80
    content: "     online store, cold-start fallback, scheduled retraining\n"
  - delay: 80
    content: "     \e[90mtags: [fraud, ml, gbm, feast, payments, shap]\e[0m\n\n"
  - delay: 700
    content: "\e[32m$\e[0m \e[1mKAOS_DB=payments-demo.db kaos skills search \"terraform kubernetes\"\e[0m\n\n"
