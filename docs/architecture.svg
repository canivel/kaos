<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <style>
      /* Light mode (default) */
      .bg { fill: #f8f9fa; }
      .layer-label { fill: #495057; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
      .box { rx: 8; ry: 8; stroke-width: 1.5; }
      .box-text { font-size: 13px; font-weight: 600; }
      .box-sub { font-size: 10px; fill: #868e96; }
      .arrow { stroke: #adb5bd; stroke-width: 1.5; fill: none; marker-end: url(#arrowLight); }
      .divider { stroke: #dee2e6; stroke-width: 1; stroke-dasharray: 4,4; }

      /* Interface layer */
      .iface-box { fill: #f1f0ff; stroke: #6c5ce7; }
      .iface-text { fill: #5b4cdb; }
      /* Orchestration layer */
      .orch-box { fill: #e8f7ff; stroke: #0984e3; }
      .orch-text { fill: #0873c4; }
      /* Core layer */
      .core-box { fill: #eafff5; stroke: #00b894; }
      .core-text { fill: #009d80; }
      /* Storage layer */
      .store-box { fill: #fff5e6; stroke: #e17055; }
      .store-text { fill: #c0392b; }
      /* Meta-Harness layer */
      .mh-box { fill: #fdf0ff; stroke: #a855f7; }
      .mh-text { fill: #9333ea; }

      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0a0a12; }
        .layer-label { fill: #9ca3af; }
        .box-sub { fill: #6b7280; }
        .arrow { stroke: #4b5563; marker-end: url(#arrowDark); }
        .divider { stroke: #1f2937; }
        .iface-box { fill: #1a1730; stroke: #8b7cf7; }
        .iface-text { fill: #a29bfe; }
        .orch-box { fill: #0d1a2a; stroke: #3b82f6; }
        .orch-text { fill: #60a5fa; }
        .core-box { fill: #0a1f18; stroke: #10b981; }
        .core-text { fill: #34d399; }
        .store-box { fill: #1f140d; stroke: #f97316; }
        .store-text { fill: #fb923c; }
        .mh-box { fill: #1a0f24; stroke: #c084fc; }
        .mh-text { fill: #d8b4fe; }
        .box-text { fill: #e5e7eb; }
      }
    </style>
    <marker id="arrowLight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#adb5bd" stroke-width="1.2"/>
    </marker>
    <marker id="arrowDark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4b5563" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="680" rx="12"/>

  <!-- ═══ INTERFACES ═══ -->
  <text class="layer-label" x="40" y="36">Interfaces</text>
  <rect class="box iface-box" x="40" y="48" width="180" height="56"/>
  <text class="box-text iface-text" x="130" y="72" text-anchor="middle">CLI</text>
  <text class="box-sub" x="130" y="90" text-anchor="middle">19 commands</text>

  <rect class="box iface-box" x="250" y="48" width="180" height="56"/>
  <text class="box-text iface-text" x="340" y="72" text-anchor="middle">MCP Server</text>
  <text class="box-sub" x="340" y="90" text-anchor="middle">17 tools &bull; stdio / SSE</text>

  <rect class="box iface-box" x="460" y="48" width="180" height="56"/>
  <text class="box-text iface-text" x="550" y="72" text-anchor="middle">Python SDK</text>
  <text class="box-sub" x="550" y="90" text-anchor="middle">from kaos import Kaos</text>

  <rect class="box iface-box" x="670" y="48" width="190" height="56"/>
  <text class="box-text iface-text" x="765" y="72" text-anchor="middle">Dashboard</text>
  <text class="box-sub" x="765" y="90" text-anchor="middle">Textual TUI</text>

  <!-- Arrows: Interfaces → Orchestration -->
  <path class="arrow" d="M340,104 L340,140"/>

  <!-- ═══ ORCHESTRATION ═══ -->
  <line class="divider" x1="40" y1="130" x2="860" y2="130"/>
  <text class="layer-label" x="40" y="158">Orchestration</text>

  <rect class="box orch-box" x="40" y="170" width="240" height="56"/>
  <text class="box-text orch-text" x="160" y="194" text-anchor="middle">Claude Code Runner (CCR)</text>
  <text class="box-sub" x="160" y="212" text-anchor="middle">plan → act → observe loop</text>

  <rect class="box orch-box" x="310" y="170" width="240" height="56"/>
  <text class="box-text orch-text" x="430" y="194" text-anchor="middle">GEPA Router</text>
  <text class="box-sub" x="430" y="212" text-anchor="middle">classify complexity → route model</text>

  <rect class="box orch-box" x="580" y="170" width="280" height="56"/>
  <text class="box-text orch-text" x="720" y="194" text-anchor="middle">vLLM Client (raw httpx)</text>
  <text class="box-sub" x="720" y="212" text-anchor="middle">any OpenAI-compatible endpoint</text>

  <!-- Arrows: CCR → GEPA → vLLM -->
  <path class="arrow" d="M280,198 L308,198"/>
  <path class="arrow" d="M550,198 L578,198"/>
  <!-- Arrow: Orchestration → Core -->
  <path class="arrow" d="M160,226 L160,270"/>

  <!-- ═══ META-HARNESS ═══ -->
  <line class="divider" x1="40" y1="248" x2="860" y2="248"/>
  <text class="layer-label" x="40" y="276">Meta-Harness</text>

  <rect class="box mh-box" x="40" y="288" width="200" height="56"/>
  <text class="box-text mh-text" x="140" y="312" text-anchor="middle">Search Loop</text>
  <text class="box-sub" x="140" y="330" text-anchor="middle">Algorithm 1 orchestrator</text>

  <rect class="box mh-box" x="260" y="288" width="200" height="56"/>
  <text class="box-text mh-text" x="360" y="312" text-anchor="middle">Proposer Agent</text>
  <text class="box-sub" x="360" y="330" text-anchor="middle">reads archive &bull; proposes harnesses</text>

  <rect class="box mh-box" x="480" y="288" width="200" height="56"/>
  <text class="box-text mh-text" x="580" y="312" text-anchor="middle">Evaluator</text>
  <text class="box-sub" x="580" y="330" text-anchor="middle">runs harnesses &bull; captures traces</text>

  <rect class="box mh-box" x="700" y="288" width="160" height="56"/>
  <text class="box-text mh-text" x="780" y="312" text-anchor="middle">Pareto</text>
  <text class="box-sub" x="780" y="330" text-anchor="middle">multi-objective frontier</text>

  <path class="arrow" d="M240,316 L258,316"/>
  <path class="arrow" d="M460,316 L478,316"/>
  <path class="arrow" d="M680,316 L698,316"/>

  <!-- Arrow: Meta-Harness → Core -->
  <path class="arrow" d="M360,344 L360,382"/>

  <!-- ═══ KAOS CORE ═══ -->
  <line class="divider" x1="40" y1="370" x2="860" y2="370"/>
  <text class="layer-label" x="40" y="398">KAOS Core — VFS Engine</text>

  <rect class="box core-box" x="40" y="410" width="160" height="56"/>
  <text class="box-text core-text" x="120" y="434" text-anchor="middle">Namespace</text>
  <text class="box-sub" x="120" y="452" text-anchor="middle">SQL-scoped isolation</text>

  <rect class="box core-box" x="215" y="410" width="160" height="56"/>
  <text class="box-text core-text" x="295" y="434" text-anchor="middle">Blob Store</text>
  <text class="box-sub" x="295" y="452" text-anchor="middle">SHA-256 &bull; zstd</text>

  <rect class="box core-box" x="390" y="410" width="160" height="56"/>
  <text class="box-text core-text" x="470" y="434" text-anchor="middle">Event Journal</text>
  <text class="box-sub" x="470" y="452" text-anchor="middle">14 event types</text>

  <rect class="box core-box" x="565" y="410" width="160" height="56"/>
  <text class="box-text core-text" x="645" y="434" text-anchor="middle">Checkpoints</text>
  <text class="box-sub" x="645" y="452" text-anchor="middle">snapshot &bull; restore &bull; diff</text>

  <rect class="box core-box" x="40" y="480" width="160" height="56"/>
  <text class="box-text core-text" x="120" y="504" text-anchor="middle">State KV Store</text>
  <text class="box-sub" x="120" y="522" text-anchor="middle">JSON-serializable</text>

  <rect class="box core-box" x="215" y="480" width="160" height="56"/>
  <text class="box-text core-text" x="295" y="504" text-anchor="middle">Tool Registry</text>
  <text class="box-sub" x="295" y="522" text-anchor="middle">8 built-in &bull; permissions</text>

  <rect class="box core-box" x="390" y="480" width="160" height="56"/>
  <text class="box-text core-text" x="470" y="504" text-anchor="middle">Context Compressor</text>
  <text class="box-sub" x="470" y="522" text-anchor="middle">summarize &bull; truncate</text>

  <rect class="box core-box" x="565" y="480" width="160" height="56"/>
  <text class="box-text core-text" x="645" y="504" text-anchor="middle">FUSE Isolation</text>
  <text class="box-sub" x="645" y="522" text-anchor="middle">Linux &bull; optional</text>

  <!-- Arrow: Core → Storage -->
  <path class="arrow" d="M450,536 L450,580"/>

  <!-- ═══ STORAGE ═══ -->
  <line class="divider" x1="40" y1="565" x2="860" y2="565"/>
  <text class="layer-label" x="40" y="593">Storage — Single File</text>

  <rect class="box store-box" x="40" y="605" width="820" height="56"/>
  <text class="box-text store-text" x="450" y="629" text-anchor="middle">SQLite (.db) — portable, queryable, crash-safe</text>
  <text class="box-sub" x="450" y="647" text-anchor="middle">agents &bull; files &bull; blobs &bull; tool_calls &bull; state &bull; events &bull; checkpoints &bull; schema_version</text>
</svg>
