  <text x="645" y="522" text-anchor="middle" fill="#6b7280" font-size="10">Linux &#x00B7; optional</text>

  <path d="M450,536 L450,580" fill="none" stroke="#4b5563" stroke-width="1.5" marker-end="url(#a)"/>

