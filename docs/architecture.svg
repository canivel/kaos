  <path d="M380,316 L388,316" fill="none" stroke="#4b5563" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M555,316 L563,316" fill="none" stroke="#4b5563" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M730,316 L738,316" fill="none" stroke="#4b5563" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M472,344 L472,382" fill="none" stroke="#4b5563" stroke-width="1.5" marker-end="url(#a)"/>

